<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — WatchDiff</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #18181f;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5; --muted: #8888a0;
    --accent: #7c6cf8; --accent2: #a89ff8; --accent-bg: rgba(124,108,248,0.12);
    --green: #34d399; --red: #f87171;
    --serif: 'DM Serif Display', serif; --sans: 'DM Sans', sans-serif; --radius: 12px;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .logo { font-family: var(--serif); font-size: 1.4rem; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; margin-bottom: 2.5rem; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
  h1 { font-family: var(--serif); font-size: 1.8rem; margin-bottom: 0.4rem; }
  .subtitle { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--muted); }
  input { width: 100%; padding: 0.75rem 1rem; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .btn { width: 100%; padding: 0.85rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
  .btn:hover { background: #6a5ae0; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: var(--red); margin-bottom: 1rem; display: none; }
  .perks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
  .perk { font-size: 0.82rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .perk-check { color: var(--green); }
  .alt-link { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--muted); }
  .alt-link a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>
<a href="/" class="logo"><span class="logo-dot"></span>WatchDiff</a>
<div class="card">
  <h1>Create your account</h1>
  <p class="subtitle">Start monitoring for free — no credit card required.</p>
  <div class="perks">
    <div class="perk"><span class="perk-check">✓</span> 5 URLs monitored for free</div>
    <div class="perk"><span class="perk-check">✓</span> Email alerts when anything changes</div>
    <div class="perk"><span class="perk-check">✓</span> 30 days of change history</div>
  </div>
  <div class="error" id="error"></div>
  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password <span style="font-size:0.78rem; color:var(--muted);">(min 8 characters)</span></label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
  </div>
  <button class="btn" id="registerBtn" onclick="register()">Create free account →</button>
  <div class="alt-link">Already have an account? <a href="/login">Sign in</a></div>
</div>

<script>
async function register() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('registerBtn');
  const errEl = document.getElementById('error');

  if (!email || !password) { showError('Please fill in all fields'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account…';
  errEl.style.display = 'none';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Registration failed'); btn.disabled = false; btn.textContent = 'Create free account →'; return; }
    window.location.href = '/dashboard';
  } catch {
    showError('Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create free account →';
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
